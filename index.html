function calc(hb){
  const i48t=hb.itc48Base+hb.itc48EC+hb.itc48DC,i48et=hb.itc48E+hb.itc48EEC+hb.itc48EDC,tot=i48t+i48et,xfer=tot*hb.transferRate,disc=tot-xfer;

  return years.map(yr=>{

}

  var creditData=years.slice(0,12).map(function(yr){
    var y=yr-2029;
    return{year:yr,ITC:yr===2029?Math.round(d.xfer/1000):0,"PTC 10MW":y<10&&hub==="10MW"?Math.round(d.apt/1000):0,"PTC 5MW":y<10&&hub==="5MW"?Math.round(d.apt/1000):0};
  });

  return h("div",{style:{background:C.navy,minHeight:"100vh",padding:"24px 20px"}},
    h("style",null,"@keyframes fd{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}"),

    // MASTHEAD
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22,flexWrap:"wrap",gap:12}},
      h("div",null,
        h("div",{style:{fontSize:10,color:C.teal,letterSpacing:"0.18em",textTransform:"uppercase",marginBottom:5}},"Investor Overview · Confidential · June 2026"),
        h("h1",{style:{fontSize:22,fontWeight:800,color:C.white,margin:0,letterSpacing:"-0.02em"}},"NovaSpark / Forerunner Hydrogen Infrastructure Platform"),
        h("div",{style:{fontSize:12,color:C.slate,marginTop:4}},hb.solar+" · "+hb.electrolyzer+" · "+hb.h2prod)

      h("div",{style:{display:"flex",gap:8,flexShrink:0}},
        ["10MW","5MW"].map(function(hv){return h("button",{key:hv,onClick:function(){setHub(hv);setChip(null);},style:{padding:"8px 18px",borderRadius:6,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:hub===hv?C.teal:C.navyLt,color:hub===hv?C.navy:C.slate,transition:"all 0.15s"}},hv+" Hub");})

    // KPI CHIPS

    ),

    // DRILL-DOWN
    drill&&h("div",{style:{background:C.navyMid,borderRadius:10,border:"1px solid "+(accentMap[activeChip]||C.teal)+"70",padding:"24px 28px",marginBottom:16,animation:"fd 0.15s ease"}},

        h("button",{onClick:function(){setChip(null);},style:{background:"none",border:"1px solid "+C.muted,borderRadius:6,color:C.slate,cursor:"pointer",padding:"4px 14px",fontSize:12}},"x Close")

      h(Drill,{rows:drill.rows,note:drill.note})
    ),

    // ROW 1: Waterfall + Revenue
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}},
      h(Panel,null,
        h(SH,{num:"01",title:"Capital & Incentive Waterfall",sub:"EC+DC adders (50%) + 45V NPV + depreciation shield"}),
        h(ResponsiveContainer,{width:"100%",height:220},
          h(BarChart,{data:wfData,margin:{top:4,right:10,bottom:0,left:10}},
            h(XAxis,{dataKey:"label",tick:{fill:C.slate,fontSize:8},axisLine:false,tickLine:false}),
            h(YAxis,{tick:{fill:C.muted,fontSize:8},axisLine:false,tickLine:false,tickFormatter:function(v){return v<0?"($"+Math.abs(v/1000).toFixed(0)+"M)":"$"+(v/1000).toFixed(0)+"M";}}),
            h(Tooltip,{content:h(Tip,null),cursor:{fill:"rgba(255,255,255,0.04)"}}),
            h(Bar,{dataKey:"value",radius:[4,4,0,0],label:{position:"top",fill:C.slate,fontSize:8,formatter:function(v){return v<0?"($"+Math.abs(v/1000).toFixed(1)+"M)":"$"+(v/1000).toFixed(1)+"M";}}},
              wfData.map(function(d,i){return h(Recharts.Cell,{key:i,fill:d.color});})
            )
          )
        ),
        h("div",{style:{display:"flex",flexWrap:"wrap",gap:8,marginTop:10}},
          wfData.map(function(wd){return h("div",{key:wd.label,style:{display:"flex",alignItems:"center",gap:5,fontSize:10}},h("div",{style:{width:8,height:8,borderRadius:2,background:wd.color}}),h("span",{style:{color:C.slate}},wd.label));})

              ),
              h("div",{style:{height:5,background:C.navyLt,borderRadius:3,overflow:"hidden"}},h("div",{style:{width:p+"%",height:"100%",background:rC[i],borderRadius:3,transition:"width 0.4s ease"}})),
              h("div",{style:{fontSize:10,color:C.muted,marginTop:2}},rN[i])

      )
    ),

    // ROW 2: Cash Flow + DSCR
    h("div",{style:{display:"grid",gridTemplateColumns:"3fr 2fr",gap:14,marginBottom:14}},
      h(Panel,null,
        h(SH,{num:"03",title:"25-Year Cash Flow Profile",sub:"EBITDA, Debt Service, Free Cash Flow to Equity ($K)"}),
        h(ResponsiveContainer,{width:"100%",height:220},
          h(ComposedChart,{data:cf,margin:{top:4,right:8,bottom:0,left:0}},
            h(CartesianGrid,{strokeDasharray:"3 3",stroke:C.navyLt}),
            h(XAxis,{dataKey:"year",tick:{fill:C.muted,fontSize:9},axisLine:false,tickLine:false,tickFormatter:function(v){return"'"+String(v).slice(2);}}),
            h(YAxis,{tick:{fill:C.muted,fontSize:9},axisLine:false,tickLine:false,tickFormatter:function(v){return v>=1000?"$"+v/1000+"M":v<0?"($"+Math.abs(v)+"K)":"$"+v+"K";}}),

          )

        h("div",{style:{fontSize:10,color:C.muted,marginTop:8}},"PTC ends Year 10 (2038). Debt fully amortized Year 20. Revenue escalates 1.5-2% annually.")

      h(Panel,null,
        h(SH,{num:"04",title:"Debt Service Coverage",sub:"DSCR = (EBITDA + PTC) / Annual Debt Service"}),
        h(ResponsiveContainer,{width:"100%",height:190},
          h(ComposedChart,{data:dscrData,margin:{top:4,right:20,bottom:0,left:-10}},

            h(YAxis,{tick:{fill:C.muted,fontSize:9},axisLine:false,tickLine:false,domain:[0,4],tickFormatter:function(v){return v+"x";}}),
            h(Tooltip,{content:h(Tip,null),cursor:{fill:"rgba(255,255,255,0.04)"}}),

            h(Area,{type:"monotone",dataKey:"dscr",name:"DSCR",fill:C.teal+"20",stroke:C.teal,strokeWidth:2,dot:false})
          )
        ),
        h("div",{style:{marginTop:10}},
          [["Yr 1 with PTC",d.dscrW+"x",C.green],["Yr 1 without PTC",d.dscrN+"x",C.amber],["Lender minimum","1.25x",C.red]].map(function(row){
            return h("div",{key:row[0],style:{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:5}},h("span",{style:{color:C.slate}},row[0]),h("span",{style:{color:row[2],fontWeight:700}},row[1]));
          })
        )
      )
    ),

    // ROW 3: Tax Credits + Scenarios
    h("div",{style:{display:"grid",gridTemplateColumns:"2fr 3fr",gap:14,marginBottom:14}},
      h(Panel,null,
        h(SH,{num:"05",title:"Tax Credit Cash Flow",sub:"ITC at COD + 45V PTC years 1-10 ($K)"}),
        h(ResponsiveContainer,{width:"100%",height:190},
          h(BarChart,{data:creditData,margin:{top:4,right:8,bottom:0,left:0}},
            h(CartesianGrid,{strokeDasharray:"3 3",stroke:C.navyLt}),
            h(XAxis,{dataKey:"year",tick:{fill:C.muted,fontSize:9},axisLine:false,tickLine:false,tickFormatter:function(v){return"'"+String(v).slice(2);}}),
            h(YAxis,{tick:{fill:C.muted,fontSize:9},axisLine:false,tickLine:false,tickFormatter:function(v){return v>=1000?"$"+v/1000+"M":"$"+v+"K";}}),
            h(Tooltip,{content:h(Tip,null),cursor:{fill:"rgba(255,255,255,0.04)"}}),
            h(Legend,{iconSize:8,wrapperStyle:{fontSize:10,color:C.slate}}),
            h(Bar,{dataKey:"ITC",name:"ITC Transfer",stackId:"a",fill:C.teal}),
            h(Bar,{dataKey:"PTC 10MW",name:"PTC 10MW",stackId:"a",fill:C.gold}),
            h(Bar,{dataKey:"PTC 5MW",name:"PTC 5MW",stackId:"a",fill:C.amber})
          )
        ),
        h("div",{style:{marginTop:10}},
          [["ITC (EC+DC)",$M(d.xfer),C.teal,"At COD"],["45V PTC 10yr",$M(d.pt10),C.gold,$$(d.apt)+"/yr"],["Depr Shield",$M(d.totSh),C.amber,"Yr 1-6"]].map(function(row){
            return h("div",{key:row[0],style:{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4}},h("span",{style:{color:C.slate}},row[0]),h("span",null,h("span",{style:{color:row[2],fontWeight:700}},row[1]),h("span",{style:{color:C.muted,fontSize:10,marginLeft:5}},row[3])));
          })
        )
      ),
      h(Panel,null,
        h(SH,{num:"06",title:"Scenario Analysis — Equity IRR",sub:"Base case "+d.irr+" · 8 scenarios · 10 MW Hub"}),
        h("div",{style:{overflowX:"auto"}},
          h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:11}},
            h("thead",null,h("tr",null,["Scenario","Rev","H2","45V","Rate","Equity IRR"].map(function(hd){return h("th",{key:hd,style:{textAlign:hd==="Scenario"?"left":"center",color:C.slate,fontWeight:600,fontSize:10,paddingBottom:8,borderBottom:"1px solid "+C.navyLt,padding:"0 8px 8px 0"}},hd);}))),
            h("tbody",null,SCEN.map(function(s,i){
              return h("tr",{key:s.name,style:{background:i%2===0?"transparent":C.navyLt+"50"}},
                h("td",{style:{padding:"7px 8px 7px 0",color:C.white,fontWeight:s.base?700:400}},s.base&&h("span",{style:{background:C.teal,color:C.navy,fontSize:8,padding:"1px 5px",borderRadius:3,marginRight:6,fontWeight:700}},"BASE"),s.name),
                [s.rev,s.h2,s.ptc,s.rate].map(function(v,j){return h("td",{key:j,style:{padding:"7px 8px",textAlign:"center",color:v==="--"?C.muted:C.slate}},v==="--"?"--":v);}),
                h("td",{style:{padding:"7px 8px",textAlign:"center",fontWeight:700,color:s.color}},s.irr)
              );
            }))
          )
        )
      )
    ),

    // FOOTER
    h("div",{style:{borderTop:"1px solid "+C.navyLt,paddingTop:12,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}},
      h("div",{style:{fontSize:10,color:C.muted}},"All figures are modeled assumptions. Not investment advice. Not an offer to sell securities. Subject to tax counsel review, engineering confirmation, and lender underwriting."),
      h("div",{style:{fontSize:10,color:C.teal,letterSpacing:"0.1em"}},"NOVASPARK / FORERUNNER · CONFIDENTIAL")
    )
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));
